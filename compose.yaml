name: haojixing

services:
  app:
    image: haojixing-php:8.4-fpm-pgsql
    container_name: haojixing-app
    working_dir: /var/www/html
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:9001}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-host.containers.internal}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-haojixing}
      DB_USERNAME: ${DB_USERNAME:-haojixing}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      REDIS_HOST: ${REDIS_HOST:-host.containers.internal}
      REDIS_PORT: ${REDIS_PORT:-6379}
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
      # 旧版 podman-compose 对含空格环境变量转译不稳定，这里仅保留无空格配置
      XDEBUG_CONFIG: client_host=${XDEBUG_CLIENT_HOST:-host.containers.internal}
    # 使用本地构建镜像，已内置 pdo_pgsql 扩展，标准 php-fpm 启动
    ports:
      - "${APP_FPM_PORT:-9000}:9000"
    volumes:
      - ./:/var/www/html:rw
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - app_net

  nginx:
    image: docker.io/library/nginx:1.27-alpine
    container_name: haojixing-nginx
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${APP_PORT:-9001}:80"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - app_net

  db:
    image: docker.io/library/postgres:16-alpine
    container_name: haojixing-db
    environment:
      POSTGRES_DB: ${PG_DB_DATABASE:-haojixing}
      POSTGRES_USER: ${PG_DB_USERNAME:-haojixing}
      POSTGRES_PASSWORD: ${PG_DB_PASSWORD:-change_me}
    ports:
      - "${DB_FORWARD_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_DB_USERNAME:-haojixing} -d ${PG_DB_DATABASE:-haojixing}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app_net

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: haojixing-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_FORWARD_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      # 使用 CMD-SHELL 以兼容 podman-compose 1.0.x 的命令转译
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - app_net

networks:
  app_net:

volumes:
  db_data:
  redis_data:
